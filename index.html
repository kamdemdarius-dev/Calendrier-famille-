<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Calendrier Famille</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --darius: #4f8ef7;
    --darius-soft: rgba(79,142,247,0.12);
    --merveille: #f7719a;
    --merveille-soft: rgba(247,113,154,0.12);
    --accent: #a78bfa;
    --text: #f0f0f8;
    --text2: #8888aa;
    --text3: #555570;
    --success: #34d399;
    --danger: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(247,113,154,0.08) 0%, transparent 60%),
                var(--bg);
  }
  .login-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    letter-spacing: -1px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--darius), var(--merveille));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 48px; }
  .login-cards { display: flex; gap: 14px; width: 100%; max-width: 340px; }
  .login-card {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: var(--radius);
  }
  .login-card.darius::before { background: var(--darius-soft); }
  .login-card.merveille::before { background: var(--merveille-soft); }
  .login-card:active::before { opacity: 1; }
  .login-card:active { transform: scale(0.97); }
  .login-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 12px;
  }
  .login-card.darius .login-avatar { background: var(--darius-soft); border: 2px solid var(--darius); }
  .login-card.merveille .login-avatar { background: var(--merveille-soft); border: 2px solid var(--merveille); }
  .login-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
  .login-card.darius .login-name { color: var(--darius); }
  .login-card.merveille .login-name { color: var(--merveille); }
  .login-role { color: var(--text2); font-size: 12px; }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100dvh; }

  /* ── HEADER ── */
  .header {
    padding: 16px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
  }
  .header-title { font-family:'DM Serif Display',serif; font-size: 18px; }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }
  .sync-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text2);
    transition: all 0.2s;
  }
  .btn-icon:active { background: var(--surface2); transform: scale(0.93); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 14px;
    border-bottom: 2px solid transparent;
    font-size: 13px; font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── CONTENT ── */
  .content { flex: 1; overflow-y: auto; padding-bottom: 90px; }

  /* ── CALENDAR VIEW ── */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px;
  }
  .month-title { font-family:'DM Serif Display',serif; font-size: 22px; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:active { transform: scale(0.9); }

  .weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    padding: 0 12px;
  }
  .weekday {
    text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text3); padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .days-grid {
    display: grid; grid-template-columns: repeat(7,1fr);
    padding: 0 12px; gap: 2px;
  }
  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 4px 2px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
  }
  .day-cell:active { background: var(--surface2); }
  .day-cell.other-month .day-num { color: var(--text3); }
  .day-cell.today .day-num {
    background: var(--accent);
    color: white;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .day-num { font-size: 13px; font-weight: 500; line-height: 1; margin-bottom: 2px; }
  .day-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
  }
  .dot.darius { background: var(--darius); }
  .dot.merveille { background: var(--merveille); }

  /* ── DAY DETAIL ── */
  .day-detail {
    margin: 8px 16px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .day-detail-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 15px;
  }
  .shift-item {
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .shift-item:last-child { border-bottom: none; }
  .shift-color {
    width: 4px; height: 40px; border-radius: 4px; flex-shrink: 0;
  }
  .shift-color.darius { background: var(--darius); }
  .shift-color.merveille { background: var(--merveille); }
  .shift-info { flex: 1; }
  .shift-who { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .shift-who.darius { color: var(--darius); }
  .shift-who.merveille { color: var(--merveille); }
  .shift-place { font-size: 14px; font-weight: 500; }
  .shift-time { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .shift-del {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(248,113,113,0.1); border: none;
    color: var(--danger); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .no-shifts { padding: 20px 16px; color: var(--text2); font-size: 14px; text-align: center; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--darius), var(--accent));
    color: white; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(79,142,247,0.4);
    cursor: pointer;
    border: none;
    transition: transform 0.2s;
    z-index: 200;
  }
  .fab:active { transform: scale(0.92); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border: 1px solid var(--border);
    padding: 24px 20px 40px;
    width: 100%;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 20px;
  }
  .modal-title { font-family:'DM Serif Display',serif; font-size: 22px; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 12px 14px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Who picker */
  .who-picker { display: flex; gap: 10px; }
  .who-btn {
    flex: 1; padding: 12px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text2); font-weight: 600; font-size: 14px;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .who-btn.active.darius { border-color: var(--darius); background: var(--darius-soft); color: var(--darius); }
  .who-btn.active.merveille { border-color: var(--merveille); background: var(--merveille-soft); color: var(--merveille); }

  .btn-submit {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--darius), var(--accent));
    border: none; border-radius: var(--radius-sm);
    color: white; font-family:'DM Sans',sans-serif; font-weight: 600; font-size: 16px;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-submit:active { opacity: 0.85; }

  /* ── LIST VIEW ── */
  .list-section { padding: 12px 16px 4px; }
  .list-section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-dot.darius { background: var(--darius); }
  .list-dot.merveille { background: var(--merveille); }
  .list-info { flex: 1; }
  .list-date { font-size: 11px; color: var(--text2); }
  .list-place { font-size: 14px; font-weight: 500; }
  .list-time { font-size: 12px; color: var(--text2); }
  .list-who-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .list-who-badge.darius { background: var(--darius-soft); color: var(--darius); }
  .list-who-badge.merveille { background: var(--merveille-soft); color: var(--merveille); }

  /* ── SETTINGS ── */
  .settings-section { padding: 20px 16px; }
  .settings-title { font-family:'DM Serif Display',serif; font-size: 20px; margin-bottom: 16px; }
  .institution-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .institution-chip {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
  }
  .institution-name { font-size: 14px; }
  .institution-del { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 0 4px; }
  .add-institution {
    display: flex; gap: 8px;
  }
  .add-institution input {
    flex: 1; padding: 10px 14px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family:'DM Sans',sans-serif; font-size: 14px; outline: none;
  }
  .add-institution input:focus { border-color: var(--accent); }
  .btn-add {
    padding: 10px 16px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text2);
    font-size: 20px; cursor: pointer;
  }
  .logout-btn {
    width: 100%; padding: 14px;
    background: none; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text2);
    font-family:'DM Sans',sans-serif; font-weight: 500; font-size: 15px;
    cursor: pointer; margin-top: 20px;
    transition: all 0.2s;
  }
  .logout-btn:active { background: var(--surface); }

  /* ── LEGEND ── */
  .legend {
    display: flex; gap: 16px; padding: 8px 20px 4px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 20px;
    font-size: 13px; color: var(--text2);
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 400; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://calendrier-famille-f9197-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── STATE ──
let currentUser = null; // 'darius' | 'merveille'
let shifts = {}; // { id: { who, date, institution, heureDebut, heureFin } }
let institutions = { darius: [], merveille: [] };
let selectedDate = null;
let currentTab = 'calendar';
let currentMonth = new Date();
currentMonth.setDate(1);

// ── FIREBASE LISTENERS ──
const shiftsRef = ref(db, 'shifts');
const institutionsRef = ref(db, 'institutions');

onValue(shiftsRef, snap => {
  shifts = snap.val() || {};
  renderApp();
}, err => {
  document.querySelector('.sync-dot')?.classList.add('offline');
});

onValue(institutionsRef, snap => {
  const data = snap.val() || {};
  institutions.darius = data.darius || [];
  institutions.merveille = data.merveille || [];
  renderApp();
});

// ── LOGIN ──
document.querySelectorAll('.login-card').forEach(card => {
  card.addEventListener('click', () => {
    currentUser = card.dataset.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderApp();
  });
});

// ── RENDER APP ──
function renderApp() {
  if (!currentUser) return;
  renderHeader();
  if (currentTab === 'calendar') renderCalendar();
  else if (currentTab === 'list') renderList();
  else if (currentTab === 'settings') renderSettings();
}

function renderHeader() {
  const el = document.getElementById('header-content');
  const isD = currentUser === 'darius';
  el.innerHTML = `
    <div class="header-left">
      <div class="header-avatar" style="background:${isD?'rgba(79,142,247,0.15)':'rgba(247,113,154,0.15)'}; color:${isD?'var(--darius)':'var(--merveille)'}">
        ${isD?'👨‍⚕️':'👩‍⚕️'}
      </div>
      <div>
        <div class="header-title">${isD?'Darius':'Merveille'}</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
    </div>
  `;
}

// ── CALENDAR ──
function renderCalendar() {
  const content = document.getElementById('content');
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const today = new Date();

  const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  // Build days
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  let startDow = firstDay.getDay(); // 0=Sun
  // Adjust to Monday-first
  startDow = (startDow + 6) % 7;

  let daysHTML = '';
  // Previous month padding
  for (let i = 0; i < startDow; i++) {
    const d = new Date(year, month, -startDow + i + 1);
    daysHTML += dayCell(d, true, today);
  }
  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    daysHTML += dayCell(new Date(year, month, d), false, today);
  }
  // Next month padding
  const total = startDow + lastDay.getDate();
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= rem; i++) {
    daysHTML += dayCell(new Date(year, month+1, i), true, today);
  }

  // Selected day shifts
  const selKey = selectedDate ? dateKey(selectedDate) : null;
  const selShifts = selKey ? Object.entries(shifts).filter(([,s]) => s.date === selKey) : [];

  let detailHTML = '';
  if (selectedDate) {
    const opts = { weekday:'long', day:'numeric', month:'long' };
    const label = selectedDate.toLocaleDateString('fr-FR', opts);
    let shiftsItems = selShifts.length ? selShifts.map(([id, s]) => `
      <div class="shift-item">
        <div class="shift-color ${s.who}"></div>
        <div class="shift-info">
          <div class="shift-who ${s.who}">${s.who === 'darius' ? 'Darius' : 'Merveille'}</div>
          <div class="shift-place">${s.institution}</div>
          <div class="shift-time">${s.heureDebut || ''} ${s.heureFin ? '→ '+s.heureFin : ''}</div>
        </div>
        ${currentUser === s.who ? `<button class="shift-del" onclick="deleteShift('${id}')">×</button>` : ''}
      </div>
    `).join('') : `<div class="no-shifts">Aucun horaire ce jour</div>`;

    detailHTML = `
      <div class="day-detail">
        <div class="day-detail-header">${label}</div>
        ${shiftsItems}
      </div>
    `;
  }

  content.innerHTML = `
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <div class="month-title">${monthNames[month]} ${year}</div>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--darius)"></div>Darius</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--merveille)"></div>Merveille</div>
    </div>
    <div class="weekdays">
      ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d=>`<div class="weekday">${d}</div>`).join('')}
    </div>
    <div class="days-grid">${daysHTML}</div>
    ${detailHTML}
  `;
}

function dayCell(date, otherMonth, today) {
  const key = dateKey(date);
  const isToday = dateKey(today) === key;
  const isSelected = selectedDate && dateKey(selectedDate) === key;
  const dayShifts = Object.values(shifts).filter(s => s.date === key);
  const hasDarius = dayShifts.some(s => s.who === 'darius');
  const hasMerveille = dayShifts.some(s => s.who === 'merveille');

  const dots = [
    hasDarius ? '<div class="dot darius"></div>' : '',
    hasMerveille ? '<div class="dot merveille"></div>' : ''
  ].join('');

  const cls = [
    'day-cell',
    otherMonth ? 'other-month' : '',
    isToday ? 'today' : '',
    isSelected ? 'selected' : ''
  ].join(' ');

  const bg = isSelected ? 'background:var(--surface2);' : '';

  return `<div class="${cls}" style="${bg}" onclick="selectDate(${date.getFullYear()},${date.getMonth()},${date.getDate()})">
    <div class="day-num">${date.getDate()}</div>
    <div class="day-dots">${dots}</div>
  </div>`;
}

// ── LIST VIEW ──
function renderList() {
  const content = document.getElementById('content');
  const now = new Date();
  const upcoming = Object.entries(shifts)
    .filter(([,s]) => new Date(s.date) >= new Date(dateKey(now)))
    .sort((a,b) => a[1].date.localeCompare(b[1].date));

  if (!upcoming.length) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>Aucun horaire à venir</div>`;
    return;
  }

  // Group by date
  const grouped = {};
  upcoming.forEach(([id, s]) => {
    if (!grouped[s.date]) grouped[s.date] = [];
    grouped[s.date].push([id, s]);
  });

  let html = '';
  Object.entries(grouped).forEach(([date, items]) => {
    const d = new Date(date + 'T12:00:00');
    const label = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
    html += `<div class="list-section"><div class="list-section-title">${label}</div>`;
    items.forEach(([id, s]) => {
      html += `<div class="list-item">
        <div class="list-dot ${s.who}"></div>
        <div class="list-info">
          <div class="list-place">${s.institution}</div>
          <div class="list-time">${s.heureDebut || ''}${s.heureFin ? ' → '+s.heureFin : ''}</div>
        </div>
        <div class="list-who-badge ${s.who}">${s.who === 'darius' ? 'D' : 'M'}</div>
      </div>`;
    });
    html += `</div>`;
  });

  content.innerHTML = html;
}

// ── SETTINGS ──
function renderSettings() {
  const content = document.getElementById('content');
  const myInst = institutions[currentUser] || [];

  content.innerHTML = `
    <div class="settings-section">
      <div class="settings-title">Mes institutions</div>
      <div class="institution-list" id="inst-list">
        ${myInst.map((inst, i) => `
          <div class="institution-chip">
            <span class="institution-name">${inst}</span>
            <button class="institution-del" onclick="deleteInstitution(${i})">×</button>
          </div>
        `).join('') || '<div style="color:var(--text2);font-size:14px;">Aucune institution ajoutée</div>'}
      </div>
      <div class="add-institution">
        <input id="new-inst" type="text" placeholder="Ajouter une institution...">
        <button class="btn-add" onclick="addInstitution()">+</button>
      </div>
      <button class="logout-btn" onclick="logout()">← Changer d'utilisateur</button>
    </div>
  `;
}

// ── ADD SHIFT MODAL ──
function openModal(dateStr) {
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modal-overlay');
  const myInst = institutions[currentUser] || [];

  const instOptions = myInst.length
    ? myInst.map(i => `<option value="${i}">${i}</option>`).join('')
    : '<option value="">— Ajouter d\'abord une institution —</option>';

  modal.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter un horaire</div>

    <div class="form-group">
      <label class="form-label">Pour qui ?</label>
      <div class="who-picker">
        <div class="who-btn ${currentUser === 'darius' ? 'active darius' : ''}" data-who="darius" onclick="selectWho('darius')">👨‍⚕️ Darius</div>
        <div class="who-btn ${currentUser === 'merveille' ? 'active merveille' : ''}" data-who="merveille" onclick="selectWho('merveille')">👩‍⚕️ Merveille</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" type="date" id="f-date" value="${dateStr || dateKey(new Date())}">
    </div>

    <div class="form-group">
      <label class="form-label">Institution</label>
      <select class="form-select" id="f-inst">${instOptions}</select>
    </div>

    <div class="form-group form-row">
      <div>
        <label class="form-label">Début</label>
        <input class="form-input" type="time" id="f-start">
      </div>
      <div>
        <label class="form-label">Fin</label>
        <input class="form-input" type="time" id="f-end">
      </div>
    </div>

    <button class="btn-submit" onclick="submitShift()">Enregistrer</button>
  `;

  overlay.classList.add('open');
  window._selectedWho = currentUser;
}

window.selectWho = function(who) {
  window._selectedWho = who;
  document.querySelectorAll('.who-btn').forEach(b => {
    b.className = 'who-btn' + (b.dataset.who === who ? ' active ' + who : '');
  });

  // Update institution list for selected user
  const myInst = institutions[who] || [];
  const sel = document.getElementById('f-inst');
  if (sel) {
    sel.innerHTML = myInst.length
      ? myInst.map(i => `<option value="${i}">${i}</option>`).join('')
      : '<option value="">— Ajouter d\'abord une institution —</option>';
  }
};

window.submitShift = async function() {
  const date = document.getElementById('f-date').value;
  const inst = document.getElementById('f-inst').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;

  if (!date || !inst) { showToast('Veuillez remplir la date et l\'institution'); return; }

  const newRef = push(ref(db, 'shifts'));
  await set(newRef, {
    who: window._selectedWho,
    date,
    institution: inst,
    heureDebut: start,
    heureFin: end
  });

  closeModal();
  showToast('Horaire enregistré ✓');
  if (date === dateKey(selectedDate)) {} // will auto-update via listener
};

window.deleteShift = async function(id) {
  await remove(ref(db, 'shifts/' + id));
  showToast('Supprimé');
};

// ── INSTITUTIONS ──
window.addInstitution = async function() {
  const input = document.getElementById('new-inst');
  const val = input.value.trim();
  if (!val) return;
  const list = [...(institutions[currentUser] || []), val];
  await set(ref(db, 'institutions/' + currentUser), list);
  input.value = '';
  showToast('Institution ajoutée ✓');
};

window.deleteInstitution = async function(i) {
  const list = [...(institutions[currentUser] || [])];
  list.splice(i, 1);
  await set(ref(db, 'institutions/' + currentUser), list);
};

// ── NAVIGATION ──
window.prevMonth = function() {
  currentMonth.setMonth(currentMonth.getMonth() - 1);
  renderCalendar();
};
window.nextMonth = function() {
  currentMonth.setMonth(currentMonth.getMonth() + 1);
  renderCalendar();
};
window.selectDate = function(y, m, d) {
  const nd = new Date(y, m, d);
  if (selectedDate && dateKey(selectedDate) === dateKey(nd)) {
    selectedDate = null;
  } else {
    selectedDate = nd;
  }
  renderCalendar();
};

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderApp();
  });
});

// ── FAB ──
document.getElementById('fab').addEventListener('click', () => {
  const dateStr = selectedDate ? dateKey(selectedDate) : dateKey(new Date());
  openModal(dateStr);
});

// ── MODAL CLOSE ──
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── LOGOUT ──
window.logout = function() {
  currentUser = null;
  selectedDate = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

// ── UTILS ──
function dateKey(d) {
  if (!d) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

</script>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">📅 Famille</div>
  <div class="login-sub">Calendrier partagé • Synchronisé</div>
  <div class="login-cards">
    <div class="login-card darius" data-user="darius">
      <div class="login-avatar">👨‍⚕️</div>
      <div class="login-name">Darius</div>
      <div class="login-role">Infirmier</div>
    </div>
    <div class="login-card merveille" data-user="merveille">
      <div class="login-avatar">👩‍⚕️</div>
      <div class="login-name">Merveille</div>
      <div class="login-role">Infirmière</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div id="header-content" style="display:flex;align-items:center;justify-content:space-between;width:100%"></div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="calendar">📅 Calendrier</div>
    <div class="tab" data-tab="list">📋 Liste</div>
    <div class="tab" data-tab="settings">⚙️ Institutions</div>
  </div>
  <div class="content" id="content"></div>
  <button class="fab" id="fab">+</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

</body>
</html>
